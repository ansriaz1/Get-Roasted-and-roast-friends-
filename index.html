<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Roast Universe</title>

<style>

body{
background:#0a0a0f;
color:white;
font-family:Arial;
margin:0;
}

header{
text-align:center;
padding:80px 20px;
background:linear-gradient(45deg,#ff006e,#6a00ff);
}

h1{
font-size:40px;
}

.section{
padding:80px 20px;
border-bottom:1px solid #222;
text-align:center;
}

input,select{
padding:12px;
margin:6px;
border-radius:6px;
border:none;
}

button{
padding:12px 18px;
background:#ff006e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#roastCard{
background:#111;
padding:25px;
border-radius:10px;
display:inline-block;
max-width:500px;
margin-top:20px;
}

#scan{
color:#aaa;
margin-top:10px;
}

canvas{
margin-top:20px;
background:black;
border-radius:10px;
}

footer{
padding:40px;
text-align:center;
color:#888;
}

</style>

</head>

<body>

<header>

<h1>🔥 AI Roast Universe</h1>
<p>Let AI brutally roast you and your friends</p>

</header>


<div class="section">

<h2>Roast Yourself</h2>

<input id="name" placeholder="Your name">

<select id="level">
<option>Friendly</option>
<option>Savage</option>
<option>Destroy Me</option>
</select>

<br>

<button onclick="roast()">Roast Me</button>

</div>



<div class="section">

<h2>⚔️ Roast Battle</h2>

<input id="name1" placeholder="First person">
<input id="name2" placeholder="Second person">

<br>

<button onclick="battle()">Start Battle</button>

</div>



<div class="section">

<h2>😈 Roast Trap</h2>

<input id="friendName" placeholder="Friend's name">

<button onclick="generateLink()">Create Roast Trap</button>

<p id="link"></p>

</div>



<div class="section">

<h2>🧑‍💻 Personality Roast</h2>

<select id="personality">

<option>Student</option>
<option>Programmer</option>
<option>Gamer</option>
<option>Lazy Person</option>

</select>

<br>

<button onclick="personalityRoast()">Analyze</button>

</div>



<div class="section">

<h2>🎭 Meme Generator</h2>

<input id="memeText" placeholder="Enter meme text">

<br>

<button onclick="makeMeme()">Generate Meme</button>

<br>

<canvas id="memeCanvas" width="400" height="250"></canvas>

</div>



<div class="section">

<h2>🤖 AI Result</h2>

<div id="scan"></div>

<div id="roastCard">

<p id="roast"></p>

<p id="score"></p>

</div>

<br>

<button onclick="speak()">🔊 Speak</button>

<button onclick="share()">📱 Copy Roast</button>

</div>



<div class="section">

<h2>🏆 Roast Leaderboard</h2>

<ul id="leaderboard"></ul>

</div>



<footer>

Created by Ans

</footer>

<script src="script.js"></script>

</body>
</html>
